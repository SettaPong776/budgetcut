[phases.setup]
nixPkgs = ["php81", "php81Packages.composer", "nodejs-18_x", "npm-9_x", "php81Extensions.pdo_mysql"]
nixLibs = ["libmysqlclient"]
nixOverlays = ["https://github.com/railwayapp/nix-npm-overlay/archive/main.tar.gz"]

[phases.install]
cmds = [
    "mkdir -p /opt/storage/framework/{sessions,views,cache}",
    "composer install --no-dev --optimize-autoloader",
    "npm install",
    "npm run build"
]

[start]
pre_cmd = "php artisan migrate --force && php artisan config:cache && php artisan route:cache && php artisan view:cache"
